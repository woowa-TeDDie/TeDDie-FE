name: CI

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  ci:
    name: 테스트 · 타입 체크 · 빌드
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 의존성 설치
        run: npm ci

      - name: 테스트 실행
        run: npm run test -- --run

      - name: 타입 체크
        run: npm run typecheck

      - name: 빌드 검증
        run: npx vite build
